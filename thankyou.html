<script>
// ── Language Toggle ──────────────────────────────────────────────────────
const translations = {
  en: {},
  fr: {}
};

function setLang(lang) {
  document.querySelectorAll('[data-en]').forEach(el => {
    if (lang === 'fr' && el.dataset.fr) {
      el.innerHTML = el.dataset.fr;
    } else {
      el.innerHTML = el.dataset.en;
    }
  });
  document.querySelectorAll('[data-placeholder-en]').forEach(el => {
    el.placeholder = lang === 'fr' ? el.dataset.placeholderFr : el.dataset.placeholderEn;
  });
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
  localStorage.setItem('ekl_lang', lang);
  document.documentElement.lang = lang;
}

document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('ekl_lang') || 'en';
  setLang(saved);
  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.addEventListener('click', () => setLang(btn.dataset.lang));
  });
});
</script>
</body>
</html>
